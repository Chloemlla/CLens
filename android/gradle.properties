org.gradle.jvmargs=-Xmx4096m -Dfile.encoding=UTF-8
android.useAndroidX=true
android.nonTransitiveRClass=true
kotlin.code.style=official

# Gradle 9.5 + AGP 8.13.x currently emits deprecation warnings from AGP internals when it
# declares aapt2/lint-gradle using multi-string dependency notation. That is not app code.
# Keep summary mode so CI surfaces real project warnings without flooding the problems report.
org.gradle.warning.mode=summary

